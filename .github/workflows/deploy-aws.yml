name: Deploy AWS

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Validate server app
        working-directory: server
        run: node -e "require('./src/app')"

      - name: Package deployment artifact
        run: tar --exclude='release.tar.gz' -czf release.tar.gz server client ml-service deploy README.md docker-compose.prod.yml

      - name: Copy artifact to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          source: release.tar.gz
          target: /tmp/ai-interview-release/release.tar.gz

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          script: |
            set -e
            mkdir -p /var/www/ai-interview
            cd /var/www/ai-interview
            tar -xzf /tmp/ai-interview-release/release.tar.gz -C /var/www/ai-interview --strip-components=1
            cd server
            npm install --omit=dev
            npm run pm2:reload || npm run start:prod
            sudo systemctl reload nginx
