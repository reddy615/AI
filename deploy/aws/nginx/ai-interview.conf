map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream ai_interview_server {
  server 127.0.0.1:5000;
  keepalive 32;
}

upstream ai_interview_ml {
  server 127.0.0.1:8000;
  keepalive 16;
}

server {
  listen 80;
  server_name _;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name _;

  ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

  client_max_body_size 20m;

  location /api/ {
    proxy_pass http://ai_interview_server;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  location /socket.io/ {
    proxy_pass http://ai_interview_server;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /ml/ {
    proxy_pass http://ai_interview_ml/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
  }

  location / {
    root /var/www/ai-interview/client/dist;
    try_files $uri /index.html;
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
  }

  location = /health {
    proxy_pass http://ai_interview_server/health;
  }

  location = /ready {
    proxy_pass http://ai_interview_server/ready;
  }
}