version: '3.9'

services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'

  ml-service:
    build:
      context: ./ml-service
    restart: unless-stopped
    environment:
      PORT: 8000
    ports:
      - '8000:8000'

  server:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/ai-interview
      REDIS_URL: redis://redis:6379
      ML_SERVICE_URL: http://ml-service:8000
      CORS_ORIGIN: http://localhost
      JWT_SECRET: change-me
      ACCESS_TOKEN_SECRET: change-me
      REFRESH_TOKEN_SECRET: change-me
      COOKIE_SECURE: 'false'
    depends_on:
      - mongo
      - redis
      - ml-service
    ports:
      - '5000:5000'

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - '8080:80'

volumes:
  mongo_data: